<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 2.5 Elite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob"></div>
    <div class="blob secondary"></div>

    <div class="app-wrapper">
        <header>
            <div class="logo">Gemini <span>2.5 Elite</span></div>
            
            <div class="header-actions">
                <div class="status-pill">
                    <span class="status-dot"></span>
                    <span>System Online</span>
                </div>
                
                <div class="search-control">
                    <span class="label-text">Search</span>
                    <label class="switch">
                        <input type="checkbox" id="search-grounding">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </header>

        <div id="chat-box" class="chat-container">
            <div class="ai-bubble">
                <p>Hello! I am your <b>Gemini 2.5</b> assistant. I can browse the live web and format complex code blocks. How can I help you today?</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="Ask anything..." rows="1"></textarea>
                <button id="send-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <p class="disclaimer">Gemini may display inaccurate info, including about people, so double-check its responses.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
